name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        pip install flake8
    
    - name: Lint backend (critical errors only)
      working-directory: ./backend
      run: |
        flake8 app/ --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Lint ML service (critical errors only)
      working-directory: ./ml_service
      run: |
        flake8 models/ utils/ --select=E9,F63,F7,F82 --show-source --statistics